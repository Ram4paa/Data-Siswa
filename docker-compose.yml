version: '3.8'
services:
  web:
    build: /var/www/kelompok7/kelompok7-datasiswa/Sistem Informasi Data Siswa 
    container_name: sistem-data-web
    restart: always
    ports:
      - "5007:3000"
    environment:
      - MONGO_URI=mongodb://database:27017/Informasi_Data_Siswa
      - PORT=3000
      - SESSION_SECRET=sut
    depends_on:
      - database

  database:
    image: mongo:latest
    container_name: sistem-data-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: